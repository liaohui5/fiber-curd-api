services:
  redis_server:
    image: redis:8
    container_name: redis_server
    restart: always
    ports:
      - 6379:6379
    volumes:
      - ./redis_data:/data

  asynqmon:
    image: hibiken/asynqmon
    container_name: asynqmon
    depends_on:
      - redis_server
    ports:
      - 8080:8080
    command: --redis-addr=redis_server:6379

  api_server:
    build: "."
    container_name: api_server
    restart: "always"
    depends_on:
      - redis_server
    ports:
      - "8000:3000"
